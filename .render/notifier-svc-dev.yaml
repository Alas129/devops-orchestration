apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notifier-svc
  namespace: default
  labels:
    app.kubernetes.io/name: notifier-svc
    app.kubernetes.io/instance: notifier-svc
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
    helm.sh/chart: notifier-svc-0.1.0
    env: dev
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/load-balancer-attributes: "deregistration_delay.timeout_seconds=30"
    alb.ingress.kubernetes.io/certificate-arn: "REPLACE_DEV_ACM_ARN"
    external-dns.alpha.kubernetes.io/hostname: "api.dev.example.com"
spec:
  ingressClassName: alb
  rules:
    - host: api.dev.example.com
      http:
        paths:
          - path: /api/v1/notifier
            pathType: Prefix
            backend:
              service:
                name: notifier-svc
                port:
                  name: http
