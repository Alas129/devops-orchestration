# Source: notifier-svc/templates/migration-job.yaml
# ArgoCD PreSync hook — runs migrations BEFORE any new pods roll out.
# Failure aborts the sync, so the previous version keeps serving uninterrupted.
# Image: a per-service `<svc>-migrate:<tag>` image built in CI (golang-migrate
# binary + the SQL files from apps/<svc>/migrations baked in at /migrations).
apiVersion: batch/v1
kind: Job
metadata:
  name: notifier-svc-migrate
  namespace: default
  labels:
    app.kubernetes.io/name: notifier-svc
    app.kubernetes.io/instance: notifier-svc
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
    helm.sh/chart: notifier-svc-0.1.0
    env: dev
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifier-svc
        app.kubernetes.io/instance: notifier-svc
    spec:
      restartPolicy: Never
      serviceAccountName: notifier-svc
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: "REPLACE_ECR_REGISTRY/usf-devops/notifier-svc-migrate:git-replaceme"
          env:
            - name: DB_HOST
              value: "REPLACE_RDS_ENDPOINT"
            - name: DB_NAME
              value: "devops_dev"
            - name: DB_USER
              value: "app_dev"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
