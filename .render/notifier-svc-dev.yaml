# Source: notifier-svc/templates/networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notifier-svc
  namespace: default
  labels:
    app.kubernetes.io/name: notifier-svc
    app.kubernetes.io/instance: notifier-svc
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
    helm.sh/chart: notifier-svc-0.1.0
    env: dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: notifier-svc
      app.kubernetes.io/instance: notifier-svc
  policyTypes: [Ingress, Egress]
  ingress:
    # Same-namespace ingress (frontend, tasks-svc) and the ALB controller's
    # health check (which lands in target-group SG).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS, RDS, and AWS APIs (IAM auth token signer) — broad egress is OK
    # because security boundary is at IAM, not network.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # IMDS — IRSA uses STS, not IMDS
---
