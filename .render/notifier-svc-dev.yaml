# Source: notifier-svc/templates/analysistemplate.yaml
# Argo Rollouts queries Prometheus during canary steps; if these checks fail,
# the rollout pauses and rolls back.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: notifier-svc-analysis
  namespace: default
spec:
  args:
    - name: service
    - name: namespace
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.99
      failureLimit: 2
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{
                namespace="{{args.namespace}}",
                app_kubernetes_io_name="{{args.service}}",
                status!~"5.."
            }[2m]))
            /
            sum(rate(http_requests_total{
                namespace="{{args.namespace}}",
                app_kubernetes_io_name="{{args.service}}"
            }[2m]))
    - name: p95-latency
      interval: 30s
      successCondition: result[0] <= 1.0
      failureLimit: 2
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.95,
              sum by (le) (rate(http_request_duration_seconds_bucket{
                namespace="{{args.namespace}}",
                app_kubernetes_io_name="{{args.service}}"
              }[2m]))
            )
---
# Source: notifier-svc/templates/prometheusrule.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: notifier-svc
  namespace: default
  labels:
    app.kubernetes.io/name: notifier-svc
    app.kubernetes.io/instance: notifier-svc
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
    helm.sh/chart: notifier-svc-0.1.0
    env: dev
    release: kube-prometheus-stack
spec:
  groups:
    - name: notifier-svc.slo
      interval: 30s
      rules:
        - alert: AuthSvcHighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="default",status=~"5..",app_kubernetes_io_name="notifier-svc"}[5m]))
              /
            sum(rate(http_requests_total{namespace="default",app_kubernetes_io_name="notifier-svc"}[5m])) > 0.01
          for: 5m
          labels:
            severity: critical
            service: notifier-svc
            env: dev
          annotations:
            summary: "notifier-svc 5xx > 1% for 5m"
            description: "notifier-svc in default is exceeding the 1% error budget"
        - alert: AuthSvcHighLatency
          expr: |
            histogram_quantile(0.95,
              sum by (le) (rate(http_request_duration_seconds_bucket{namespace="default",app_kubernetes_io_name="notifier-svc"}[5m]))
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            service: notifier-svc
            env: dev
          annotations:
            summary: "notifier-svc p95 latency > 500ms for 10m"
---
# Source: notifier-svc/templates/rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notifier-svc
  namespace: default
  labels:
    app.kubernetes.io/name: notifier-svc
    app.kubernetes.io/instance: notifier-svc
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
    helm.sh/chart: notifier-svc-0.1.0
    env: dev
spec:
  replicas: 2
  strategy:
    canary:
      canaryService: notifier-svc-canary
      stableService: notifier-svc
      trafficRouting:
        alb:
          ingress: notifier-svc
          servicePort: 8080
      maxSurge: 25%
      maxUnavailable: 0
      analysis:
        templates:
          - templateName: notifier-svc-analysis
        startingStep: 1
        args:
          - name: service
            value: notifier-svc
          - name: namespace
            value: default
      steps:
        - setWeight: 10
        - pause:
            duration: 2m
        - setWeight: 50
        - pause:
            duration: 3m
        - setWeight: 100
  selector:
    matchLabels:
      app.kubernetes.io/name: notifier-svc
      app.kubernetes.io/instance: notifier-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifier-svc
        app.kubernetes.io/instance: notifier-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: notifier-svc
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: notifier-svc
              app.kubernetes.io/instance: notifier-svc
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: notifier-svc
              app.kubernetes.io/instance: notifier-svc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: notifier-svc
                    app.kubernetes.io/instance: notifier-svc
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: app
          image: "REPLACE_ECR_REGISTRY/usf-devops/notifier-svc:git-replaceme"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DB_HOST
              value: "REPLACE_RDS_ENDPOINT"
            - name: DB_NAME
              value: "devops_dev"
            - name: DB_USER
              value: "app_dev"
            - name: DB_IAM_AUTH
              value: "true"
            - name: AWS_REGION
              value: "us-east-1"
            - name: NATS_URL
              value: "nats://nats.messaging.svc.cluster.local:4222"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
