# Source: frontend/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: default
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: frontend
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: frontend-0.1.0
    env: prod
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /api/healthz
    alb.ingress.kubernetes.io/load-balancer-attributes: "deregistration_delay.timeout_seconds=30,access_logs.s3.enabled=true,access_logs.s3.bucket=REPLACE_PROD_ALB_LOGS_BUCKET,access_logs.s3.prefix=frontend"
    alb.ingress.kubernetes.io/certificate-arn: "REPLACE_PROD_ACM_ARN"
    external-dns.alpha.kubernetes.io/hostname: "app.prod.example.com"
spec:
  ingressClassName: alb
  rules:
    - host: app.prod.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-active
                port:
                  name: http
