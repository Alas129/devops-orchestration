# Source: frontend/templates/networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend
  namespace: default
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: frontend
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: frontend-0.1.0
    env: prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/instance: frontend
  policyTypes: [Ingress, Egress]
  ingress:
    # ALB target health checks come from the cluster's node SG, but the
    # easiest namespace label match is kube-system; allow same-ns too in
    # case an in-cluster client (e.g. a synthetic prober) hits it.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 3000
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    # Backend services in the same namespace (Next.js rewrites + SSR fetch).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - port: 8080
          protocol: TCP
    # Outbound HTTPS for any third-party API calls (CDN, telemetry).
    # IMDS is explicitly excluded — frontend never needs it.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - { port: 443, protocol: TCP }
