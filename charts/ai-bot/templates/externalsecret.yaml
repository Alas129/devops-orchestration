{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-bot-secrets
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ai-bot.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: ai-bot-secrets
    creationPolicy: Owner
  data:
    - secretKey: slack_signing_secret
      remoteRef:
        key: {{ printf "%s/slack-signing-secret" .Values.externalSecret.ssmPathPrefix }}
    - secretKey: anthropic_api_key
      remoteRef:
        key: {{ printf "%s/anthropic-api-key" .Values.externalSecret.ssmPathPrefix }}
    # slack-bot-token is provisioned in SSM but currently unused — we use
    # response_url for replies. Still pull it so future code can switch to
    # chat.postMessage without re-doing the secret plumbing.
    - secretKey: slack_bot_token
      remoteRef:
        key: {{ printf "%s/slack-bot-token" .Values.externalSecret.ssmPathPrefix }}
{{- end }}
