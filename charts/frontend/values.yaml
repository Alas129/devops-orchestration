env: dev
image:
  repository: ""
  tag: "git-replaceme"
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 3000
  type: ClusterIP

ingress:
  enabled: true
  className: alb
  host: app.dev.example.com
  certificateArn: ""
  wafAclArn: ""

serviceAccount:
  create: true
  name: frontend

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { memory: 512Mi }

# Frontend image runs as the `app` user from its Dockerfile (USER app); we
# only assert non-root + seccomp here and let the image dictate the UID.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

probes:
  startup:
    enabled: true
    path: /api/healthz
    failureThreshold: 30
    periodSeconds: 5
  readiness: { path: /api/healthz, initialDelaySeconds: 0, periodSeconds: 5 }
  liveness:  { path: /api/healthz, initialDelaySeconds: 15, periodSeconds: 10 }

hpa:
  enabled: true
  min: 2
  max: 6
  cpuTarget: 70
  memoryTarget: 75

pdb:
  enabled: true
  maxUnavailable: 0

# Blue/green: keep the previous ReplicaSet warm for 5 min after switch.
# An ALB target group flip is the only "deploy" event clients see.
blueGreen:
  scaleDownDelaySeconds: 300
  autoPromotionEnabled: true

priorityClassName: ""
topologySpread:
  enabled: true
  maxSkew: 1

config:
  authApiUrl: http://auth-svc.app.svc.cluster.local:8080
  tasksApiUrl: http://tasks-svc.app.svc.cluster.local:8080
  notifierApiUrl: http://notifier-svc.app.svc.cluster.local:8080

monitoring:
  serviceMonitor:
    enabled: false                # Next.js doesn't expose prom metrics by default

networkPolicy:
  enabled: true
  # ports backend services listen on; allowed for egress from frontend pods.
  backendPort: 8080
