env: dev                       # overridden per env
image:
  repository: ""               # filled in from gitops overlay (ECR URI)
  tag: "git-replaceme"         # bumped by release bot
  digest: ""                   # set alongside tag for digest-pinned deploys
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 8080
  type: ClusterIP

ingress:
  enabled: true
  className: alb
  host: api.dev.example.com
  pathPrefix: /api/v1/auth
  certificateArn: ""
  tlsHost: ""
  wafAclArn: ""                # optional; attach a WAFv2 web ACL when set

serviceAccount:
  create: true
  name: auth-svc
  irsaRoleArn: ""              # set per env from terraform output

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi               # NB: no CPU limit, avoid CFS throttling

# Pod-level security context. Container-level overrides are applied on top
# in the Rollout template.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

probes:
  startup:
    enabled: true
    path: /healthz
    failureThreshold: 30
    periodSeconds: 5            # 30 × 5s = 2.5min budget for slow starts (e.g. cold migration warmup)
  readiness:
    path: /healthz
    initialDelaySeconds: 0      # startupProbe handles cold start
    periodSeconds: 5
  liveness:
    path: /livez
    initialDelaySeconds: 10
    periodSeconds: 10

hpa:
  enabled: true
  min: 2
  max: 6
  cpuTarget: 70
  memoryTarget: 75              # set to 0 to disable

pdb:
  enabled: true
  # maxUnavailable=0 guarantees zero-downtime drains. The disruption is
  # absorbed by maxSurge in the Rollout (canary brings up extra pods first).
  maxUnavailable: 0

# Argo Rollouts canary, with Prometheus-driven AnalysisTemplate.
rollout:
  steps:
    - setWeight: 10
    - pause: { duration: 2m }
    - setWeight: 25
    - pause: { duration: 2m }
    - setWeight: 50
    - pause: { duration: 5m }
    - setWeight: 100
  analysis:
    enabled: true
    successRateThreshold: "0.99"
    p95LatencyThreshold: "0.5"

# Spread + anti-affinity (defence in depth on top of topologySpread)
priorityClassName: ""           # set to e.g. "platform-critical" in prod overlay
topologySpread:
  enabled: true
  maxSkew: 1

config:
  jwtIssuer: auth-svc
  jwtTtl: 1h
  dbName: devops_dev
  dbUser: app_dev
  dbHost: ""                   # rds endpoint, set per env
  useIamAuth: true
  awsRegion: us-east-1
  # OpenTelemetry — set in env overlay to enable exporting traces to Tempo.
  otelEndpoint: ""

# JWT signing secret comes from SSM via ExternalSecret.
externalSecret:
  enabled: true
  jwtSsmPath: /devops/auth-svc/jwt-secret

migration:
  enabled: true
  # Per-service migrate image built in CI (golang-migrate + SQL files baked in).
  # Set this in the env overlay to e.g. <id>.dkr.ecr.<region>.amazonaws.com/usf-devops/auth-svc-migrate
  image: ""
  ttlSecondsAfterFinished: 300

monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
  prometheusRule:
    enabled: true

networkPolicy:
  enabled: true
