{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "auth-svc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "auth-svc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "auth-svc.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    # Same-namespace ingress (frontend, tasks-svc) and the ALB controller's
    # health check (which lands in target-group SG).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # DNS, RDS, and AWS APIs (IAM auth token signer) — broad egress is OK
    # because security boundary is at IAM, not network.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # IMDS — IRSA uses STS, not IMDS
{{- end }}
