{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "auth-svc.fullname" . }}-jwt
  namespace: {{ .Release.Namespace }}
  labels: {{- include "auth-svc.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: {{ include "auth-svc.fullname" . }}-jwt
    creationPolicy: Owner
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: {{ .Values.externalSecret.jwtSsmPath }}
{{- end }}
