{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "auth-svc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-svc.labels" . | nindent 4 }}
    release: kube-prometheus-stack
spec:
  groups:
    - name: auth-svc.slo
      interval: 30s
      rules:
        - alert: AuthSvcHighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}",status=~"5..",app_kubernetes_io_name="auth-svc"}[5m]))
              /
            sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}",app_kubernetes_io_name="auth-svc"}[5m])) > 0.01
          for: 5m
          labels:
            severity: critical
            service: auth-svc
            env: {{ .Values.env }}
          annotations:
            summary: "auth-svc 5xx > 1% for 5m"
            description: "auth-svc in {{ .Release.Namespace }} is exceeding the 1% error budget"
        - alert: AuthSvcHighLatency
          expr: |
            histogram_quantile(0.95,
              sum by (le) (rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}",app_kubernetes_io_name="auth-svc"}[5m]))
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            service: auth-svc
            env: {{ .Values.env }}
          annotations:
            summary: "auth-svc p95 latency > 500ms for 10m"
{{- end }}
