env: dev
image:
  repository: ""
  tag: "git-replaceme"
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 8080
  type: ClusterIP

ingress:
  enabled: true
  className: alb
  host: api.dev.example.com
  pathPrefix: /api/v1/tasks
  certificateArn: ""
  tlsHost: ""
  wafAclArn: ""

serviceAccount:
  create: true
  name: tasks-svc
  irsaRoleArn: ""

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { memory: 256Mi }

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

probes:
  startup:
    enabled: true
    path: /healthz
    failureThreshold: 30
    periodSeconds: 5
  readiness: { path: /healthz, initialDelaySeconds: 0, periodSeconds: 5 }
  liveness:  { path: /livez,    initialDelaySeconds: 10, periodSeconds: 10 }

hpa:
  enabled: true
  min: 2
  max: 6
  cpuTarget: 70
  memoryTarget: 75

pdb:
  enabled: true
  maxUnavailable: 0

rollout:
  steps:
    - setWeight: 10
    - pause: { duration: 2m }
    - setWeight: 25
    - pause: { duration: 2m }
    - setWeight: 50
    - pause: { duration: 5m }
    - setWeight: 100
  analysis:
    enabled: true
    successRateThreshold: "0.99"
    p95LatencyThreshold: "0.5"

priorityClassName: ""
topologySpread:
  enabled: true
  maxSkew: 1

config:
  jwtIssuer: auth-svc
  dbName: devops_dev
  dbUser: app_dev
  dbHost: ""
  useIamAuth: true
  awsRegion: us-east-1
  natsUrl: nats://nats.messaging.svc.cluster.local:4222
  otelEndpoint: ""

externalSecret:
  enabled: true
  jwtSsmPath: /devops/auth-svc/jwt-secret

migration:
  enabled: true
  image: ""                       # set per env to ECR URI of tasks-svc-migrate
  ttlSecondsAfterFinished: 300

monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
  prometheusRule:
    enabled: true

networkPolicy:
  enabled: true
