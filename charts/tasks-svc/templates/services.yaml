apiVersion: v1
kind: Service
metadata:
  name: {{ include "tasks-svc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "tasks-svc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "tasks-svc.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tasks-svc.fullname" . }}-canary
  namespace: {{ .Release.Namespace }}
  labels: {{- include "tasks-svc.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "tasks-svc.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
