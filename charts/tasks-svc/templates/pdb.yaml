{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "tasks-svc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "tasks-svc.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels: {{- include "tasks-svc.selectorLabels" . | nindent 6 }}
{{- end }}
