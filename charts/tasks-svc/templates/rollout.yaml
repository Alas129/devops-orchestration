apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "tasks-svc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "tasks-svc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    canary:
      canaryService: {{ include "tasks-svc.fullname" . }}-canary
      stableService: {{ include "tasks-svc.fullname" . }}
      trafficRouting:
        alb:
          ingress: {{ include "tasks-svc.fullname" . }}
          servicePort: {{ .Values.service.port }}
      maxSurge: 25%
      maxUnavailable: 0
      {{- if .Values.rollout.analysis.enabled }}
      analysis:
        templates:
          - templateName: {{ include "tasks-svc.fullname" . }}-analysis
        startingStep: 1
        args:
          - name: service
            value: {{ include "tasks-svc.fullname" . }}
          - name: namespace
            value: {{ .Release.Namespace }}
      {{- end }}
      steps:
{{ toYaml .Values.rollout.steps | indent 8 }}
  selector:
    matchLabels: {{- include "tasks-svc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "tasks-svc.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: true
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {{- include "tasks-svc.selectorLabels" . | nindent 14 }}
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {{- include "tasks-svc.selectorLabels" . | nindent 14 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector:
                  matchLabels: {{- include "tasks-svc.selectorLabels" . | nindent 20 }}
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: LISTEN_ADDR
              value: ":{{ .Values.service.port }}"
            - name: DB_HOST
              value: {{ .Values.config.dbHost | quote }}
            - name: DB_NAME
              value: {{ .Values.config.dbName | quote }}
            - name: DB_USER
              value: {{ .Values.config.dbUser | quote }}
            - name: DB_IAM_AUTH
              value: {{ .Values.config.useIamAuth | quote }}
            - name: AWS_REGION
              value: {{ .Values.config.awsRegion | quote }}
            - name: JWT_ISSUER
              value: {{ .Values.config.jwtIssuer | quote }}
            - name: NATS_URL
              value: {{ .Values.config.natsUrl | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tasks-svc.fullname" . }}-jwt
                  key: jwt_secret
            {{- with .Values.config.otelEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ . | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_SERVICE_NAME
              value: {{ include "tasks-svc.fullname" $ }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment={{ $.Values.env }},service.version={{ $.Values.image.tag }}"
            {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
