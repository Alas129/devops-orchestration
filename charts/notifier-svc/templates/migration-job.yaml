{{- if .Values.migration.enabled }}
# ArgoCD PreSync hook — runs migrations BEFORE any new pods roll out.
# Failure aborts the sync, so the previous version keeps serving uninterrupted.
# Image: a per-service `<svc>-migrate:<tag>` image built in CI (golang-migrate
# binary + the SQL files from apps/<svc>/migrations baked in at /migrations).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "notifier-svc.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels: {{- include "notifier-svc.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  backoffLimit: 1
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels: {{- include "notifier-svc.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.migration.image }}:{{ .Values.image.tag }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ end }}"
          env:
            - name: DB_HOST
              value: {{ .Values.config.dbHost | quote }}
            - name: DB_NAME
              value: {{ .Values.config.dbName | quote }}
            - name: DB_USER
              value: {{ .Values.config.dbUser | quote }}
            - name: AWS_REGION
              value: {{ .Values.config.awsRegion | quote }}
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
{{- end }}
