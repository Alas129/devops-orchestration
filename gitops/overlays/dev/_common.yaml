# Shared values applied to every chart in the dev namespace.
# Per-service overlay files override / extend.

env: dev

config:
  awsRegion: us-east-1
  dbHost: usf-devops-nonprod.c69ekamq4sxe.us-east-1.rds.amazonaws.com     # filled in once after `terraform apply` completes
  dbName: devops_dev
  dbUser: app_dev
  useIamAuth: true
  natsUrl: nats://nats.messaging.svc.cluster.local:4222

ingress:
  className: alb
  certificateArn: arn:aws:acm:us-east-1:164856787183:certificate/f9d36d4e-9462-4a9d-91ef-1ba6d579aaa5

monitoring:
  serviceMonitor: { enabled: true, interval: 30s }
  prometheusRule: { enabled: true }

networkPolicy:
  enabled: true
