# Shared values applied to every chart in the qa namespace.

env: qa

config:
  awsRegion: us-east-1
  dbHost: usf-devops-nonprod.c69ekamq4sxe.us-east-1.rds.amazonaws.com
  dbName: devops_qa
  dbUser: app_qa
  useIamAuth: true
  natsUrl: nats://nats.messaging.svc.cluster.local:4222

ingress:
  className: alb
  certificateArn: arn:aws:acm:us-east-1:164856787183:certificate/8b5440ea-7edc-4fa8-9ab3-3831fe82945b

monitoring:
  serviceMonitor: { enabled: true, interval: 30s }
  prometheusRule: { enabled: true }

networkPolicy:
  enabled: true
