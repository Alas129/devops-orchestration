image:
  repository: 164856787183.dkr.ecr.us-east-1.amazonaws.com/usf-devops/auth-svc
  tag: git-replaceme   # populated by promote-prod.yaml on stable release tag

migration:
  enabled: false   # see dev overlay

ingress:
  enabled: true
  host: api.calmloop.space
  pathPrefix: /api/v1/auth

serviceAccount:
  # IRSA role name = "${var.project}-prod-${service}" — predictable from
  # infra/terraform/envs/prod/main.tf (`module "service_irsa"`). The role
  # is created by `terraform apply` on envs/prod; this ARN is the value
  # it WILL have, so no post-apply overlay edit is needed.
  irsaRoleArn: arn:aws:iam::164856787183:role/usf-devops-prod-auth-svc

externalSecret:
  enabled: true
  jwtSsmPath: /devops/auth-svc/jwt-secret
