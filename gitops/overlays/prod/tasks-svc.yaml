image:
  repository: 164856787183.dkr.ecr.us-east-1.amazonaws.com/usf-devops/tasks-svc
  tag: git-replaceme   # populated by promote-prod.yaml on stable release tag

migration:
  enabled: false   # see dev overlay

ingress:
  enabled: true
  host: api.calmloop.space
  pathPrefix: /api/v1/tasks

serviceAccount:
  # IRSA role name = "${var.project}-prod-${service}" — predictable from TF code.
  irsaRoleArn: arn:aws:iam::164856787183:role/usf-devops-prod-tasks-svc

externalSecret:
  enabled: true
  jwtSsmPath: /devops/auth-svc/jwt-secret
