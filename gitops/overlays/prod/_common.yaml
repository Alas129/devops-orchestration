# Shared values applied to every chart in the prod namespace.
# Per-service overlay files override / extend.

env: prod

config:
  awsRegion: us-east-1
  # Use a stable CNAME (managed in Cloudflare) → underlying RDS endpoint.
  # The CNAME survives RDS recreation; the bare AWS-generated hostname
  # `usf-devops-prod.<random>.us-east-1.rds.amazonaws.com` does not.
  # Cloudflare record is created by `infra/terraform/modules/dns` after
  # the prod RDS exists; see `tools/populate-prod-from-tf.sh` for the
  # one-shot bootstrap if you skip the Cloudflare module.
  dbHost: prod-db.calmloop.space
  dbName: devops_prod
  dbUser: app_prod
  useIamAuth: true
  natsUrl: nats://nats.messaging.svc.cluster.local:4222
  # OpenTelemetry exporter — Tempo runs in-cluster. Apps wire this in when
  # the OTEL_EXPORTER_OTLP_ENDPOINT env var is non-empty.
  otelEndpoint: http://tempo.observability.svc.cluster.local:4317

ingress:
  className: alb
  # certificateArn empty → AWS Load Balancer Controller auto-discovers an
  # ACM cert in the cluster's region whose SAN matches the ingress host.
  # The prod ACM cert is created by `infra/terraform/envs/prod/main.tf`
  # (module.acm_prod) with SANs covering app/api.prod.calmloop.space etc.,
  # so no overlay edit is needed post-apply.
  certificateArn: ""
  # Predictable from TF: "${var.project}-alb-logs-prod-${account_id}"
  accessLogsBucket: usf-devops-alb-logs-prod-164856787183
  wafAclArn: ""                                     # set after creating WAFv2 ACL

# Critical workloads in prod schedule before opportunistic ones.
priorityClassName: platform-critical

monitoring:
  serviceMonitor: { enabled: true, interval: 30s }
  prometheusRule: { enabled: true }

networkPolicy:
  enabled: true

pdb:
  maxUnavailable: 0
