# Shared values applied to every chart in the uat namespace.
# Per-service overlay files override / extend.

env: uat

config:
  awsRegion: us-east-1
  dbHost: usf-devops-nonprod.c69ekamq4sxe.us-east-1.rds.amazonaws.com     # filled in once after `terraform apply` completes
  dbName: uatops_uat
  dbUser: app_uat
  useIamAuth: true
  natsUrl: nats://nats.messaging.svc.cluster.local:4222

ingress:
  className: alb
  certificateArn: arn:aws:acm:us-east-1:164856787183:certificate/4a64fdcf-d8e6-417d-91e6-538a46d539b6

monitoring:
  serviceMonitor: { enabled: true, interval: 30s }
  prometheusRule: { enabled: true }

networkPolicy:
  enabled: true
