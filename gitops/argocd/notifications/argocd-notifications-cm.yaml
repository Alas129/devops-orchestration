# ArgoCD Notifications config. Apply alongside the argo-cd Helm release.
# The Slack webhook URL must be created out-of-band (see RUNBOOK §6) and
# stored in SSM at /devops/argocd/slack_webhook_url; the corresponding
# ExternalSecret puts it into the `argocd-notifications-secret` k8s Secret.

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ─────────────────────────── service ───────────────────────────
  # Slack incoming-webhook service. The Secret below provides
  # `slack-webhook-url`; argocd-notifications posts JSON to it.
  service.webhook.slack: |
    url: $slack-webhook-url
    headers:
    - name: Content-Type
      value: application/json

  # ─────────────────────────── templates ─────────────────────────
  # All templates write to one Slack channel via webhook; emoji + first-line
  # prefix is the only way to distinguish event types at-a-glance.

  template.app-sync-running: |
    webhook:
      slack:
        method: POST
        body: |
          {
            "text": ":hourglass_flowing_sand: ArgoCD syncing {{.app.metadata.name}} (Kubernetes namespace {{.app.spec.destination.namespace}})",
            "blocks": [
              {"type":"section","text":{"type":"mrkdwn","text":":hourglass_flowing_sand: *ArgoCD sync STARTED*\nApplication: `{{.app.metadata.name}}` (env=`{{.app.spec.destination.namespace}}`)\nKubernetes resources are being reconciled now."}},
              {"type":"context","elements":[
                {"type":"mrkdwn","text":"git revision - `{{.app.status.sync.revision | trunc 7}}`"},
                {"type":"mrkdwn","text":"<{{.context.argocdUrl}}/applications/{{.app.metadata.name}}|open Application in ArgoCD>"}
              ]}
            ]
          }

  template.app-deployed: |
    webhook:
      slack:
        method: POST
        body: |
          {
            "text": ":white_check_mark: ArgoCD deployed {{.app.metadata.name}} to Kubernetes namespace {{.app.spec.destination.namespace}}",
            "blocks": [
              {"type":"section","text":{"type":"mrkdwn","text":":white_check_mark: *ArgoCD DEPLOYED*\nApplication: `{{.app.metadata.name}}` (env=`{{.app.spec.destination.namespace}}`)\nKubernetes Rollout/Service/Ingress reconciled and pods Ready."}},
              {"type":"section","fields":[
                {"type":"mrkdwn","text":"*Health*\n`{{.app.status.health.status}}`"},
                {"type":"mrkdwn","text":"*Sync*\n`{{.app.status.sync.status}}`"},
                {"type":"mrkdwn","text":"*Git revision*\n`{{.app.status.sync.revision | trunc 7}}`"},
                {"type":"mrkdwn","text":"*Chart path*\n`charts/{{.app.metadata.labels.app}}`"}
              ]},
              {"type":"context","elements":[
                {"type":"mrkdwn","text":"<{{.context.argocdUrl}}/applications/{{.app.metadata.name}}|view Application in ArgoCD>"}
              ]}
            ]
          }

  template.app-sync-failed: |
    webhook:
      slack:
        method: POST
        body: |
          {
            "text": ":x: ArgoCD sync FAILED for {{.app.metadata.name}} → Kubernetes namespace {{.app.spec.destination.namespace}}",
            "blocks": [
              {"type":"section","text":{"type":"mrkdwn","text":":x: *ArgoCD sync FAILED*\nApplication: `{{.app.metadata.name}}` (env=`{{.app.spec.destination.namespace}}`)\nKubernetes manifests could not be applied. Likely cause: invalid YAML, RBAC denial, or admission policy rejection."}},
              {"type":"section","text":{"type":"mrkdwn","text":"*Error details*\n```{{.app.status.operationState.message}}```"}},
              {"type":"context","elements":[
                {"type":"mrkdwn","text":"git revision - `{{.app.status.sync.revision | trunc 7}}`"},
                {"type":"mrkdwn","text":"<{{.context.argocdUrl}}/applications/{{.app.metadata.name}}|investigate in ArgoCD>"}
              ]}
            ]
          }

  template.app-health-degraded: |
    webhook:
      slack:
        method: POST
        body: |
          {
            "text": ":rotating_light: ArgoCD Application {{.app.metadata.name}} is DEGRADED in Kubernetes namespace {{.app.spec.destination.namespace}}",
            "blocks": [
              {"type":"section","text":{"type":"mrkdwn","text":":rotating_light: *Application health DEGRADED*\nApplication: `{{.app.metadata.name}}` (env=`{{.app.spec.destination.namespace}}`)\nOne or more Kubernetes resources are unhealthy: pods CrashLoop / readinessProbe failing / Rollout aborted by AnalysisRun."}},
              {"type":"context","elements":[
                {"type":"mrkdwn","text":"last git revision - `{{.app.status.sync.revision | trunc 7}}`"},
                {"type":"mrkdwn","text":"<{{.context.argocdUrl}}/applications/{{.app.metadata.name}}|investigate in ArgoCD>"}
              ]}
            ]
          }

  # ─────────────────────────── triggers ──────────────────────────
  # `oncePer` ensures we don't spam — one notification per revision/state.

  trigger.on-sync-running: |
    - description: Application sync is in progress
      oncePer: app.status.operationState.startedAt
      send: [app-sync-running]
      when: app.status.operationState.phase in ['Running']

  trigger.on-deployed: |
    - description: Application is synced + healthy after a sync
      oncePer: app.status.sync.revision
      send: [app-deployed]
      when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'

  trigger.on-sync-failed: |
    - description: Application sync failed
      oncePer: app.status.operationState.startedAt
      send: [app-sync-failed]
      when: app.status.operationState.phase in ['Error', 'Failed']

  trigger.on-health-degraded: |
    - description: Application has degraded
      send: [app-health-degraded]
      when: app.status.health.status == 'Degraded'

  # ─────────────────────────── subscriptions ─────────────────────
  # Default subscriptions for every Application (overridable via per-app
  # annotation). Per-app subscribe.* annotations ADD to this list.

  subscriptions: |
    - recipients:
        - slack:devops-alerts
      triggers:
        - on-sync-running
        - on-deployed
        - on-sync-failed
        - on-health-degraded
---
# The Slack incoming-webhook URL is loaded by ExternalSecret from
# SSM /devops/argocd/slack_webhook_url.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
  data:
    - secretKey: slack-webhook-url
      remoteRef:
        key: /devops/argocd/slack_webhook_url
