apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: qa
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - { name: frontend }
          - { name: auth-svc }
          - { name: tasks-svc }
          - { name: notifier-svc }
  template:
    metadata:
      name: 'qa-{{ .name }}'
      labels: { env: qa }
      annotations:
        notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    spec:
      project: nonprod
      sources:
        - repoURL: https://github.com/Alas129/devops-orchestration.git
          targetRevision: main
          ref: values
        - repoURL: https://github.com/Alas129/devops-orchestration.git
          targetRevision: main
          path: 'charts/{{ .name }}'
          helm:
            releaseName: '{{ .name }}'
            valueFiles:
              - values.yaml
              - $values/gitops/overlays/qa/_common.yaml
              - '$values/gitops/overlays/qa/{{ .name }}.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: qa
      revisionHistoryLimit: 10
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true, PruneLast=true]
        retry:
          limit: 5
          backoff: { duration: 30s, factor: 2, maxDuration: 5m }
