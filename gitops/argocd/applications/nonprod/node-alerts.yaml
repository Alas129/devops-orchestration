apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-alerts
  namespace: argocd
  annotations:
    # Sync after kube-prometheus-stack itself is healthy so the
    # `release: kube-prometheus-stack` PrometheusRule selector matches.
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: nonprod
  source:
    repoURL: https://github.com/Alas129/devops-orchestration.git
    targetRevision: main
    path: gitops/platform/node-alerts
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
