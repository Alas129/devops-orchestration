apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prod
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - { name: frontend }
          - { name: auth-svc }
          - { name: tasks-svc }
          - { name: notifier-svc }
  template:
    metadata:
      name: 'prod-{{ .name }}'
      labels: { env: prod }
      # Trigger Slack/email notifications via argocd-notifications subscriptions.
      annotations:
        notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
        notifications.argoproj.io/subscribe.on-sync-status-unknown.slack: devops-alerts
        notifications.argoproj.io/subscribe.on-health-degraded.slack: devops-alerts
    spec:
      project: prod
      sources:
        - repoURL: https://github.com/alusigmi/devops-orchestration.git
          targetRevision: main
          ref: values
        - repoURL: https://github.com/alusigmi/devops-orchestration.git
          targetRevision: main
          path: 'charts/{{ .name }}'
          helm:
            releaseName: '{{ .name }}'
            valueFiles:
              - values.yaml
              - $values/gitops/overlays/prod/_common.yaml
              - '$values/gitops/overlays/prod/{{ .name }}.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: prod
      revisionHistoryLimit: 20
      syncPolicy:
        # Prod prune=true but selfHeal=false: drift is alerted, not silently
        # corrected. An on-call operator decides whether the manual change was
        # legitimate before re-syncing.
        automated:
          prune: true
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
