# Replaced the wide-open `default` project with env-scoped projects (see
# prod-project.yaml and nonprod-project.yaml). The bare `default` is kept
# only as a deny-all fallback so that a misconfigured Application can never
# accidentally deploy anywhere.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: default
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Deny-all fallback. Real workloads use prod-project / nonprod-project."
  sourceRepos: []
  destinations: []
  clusterResourceWhitelist: []
  namespaceResourceWhitelist: []
