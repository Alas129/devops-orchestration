# One-shot Job that creates the per-env Postgres roles + databases on the
# shared RDS instance. Runs from inside the cluster (in the VPC) so it can
# reach the private RDS endpoint.
#
# The RDS master credentials live in AWS Secrets Manager (created by the
# rds Terraform module). External Secrets Operator (ESO) pulls them into a
# K8s Secret; this Job mounts that Secret and runs idempotent SQL.
#
# Sync wave -10 ensures this completes BEFORE any application Application
# tries to start (app pods would fail to IAM-auth to a non-existent role).

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-master
  namespace: db-bootstrap
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-master
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: usf-devops-nonprod/rds/master
        property: username
    - secretKey: password
      remoteRef:
        key: usf-devops-nonprod/rds/master
        property: password
    - secretKey: host
      remoteRef:
        key: usf-devops-nonprod/rds/master
        property: host
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-bootstrap
  namespace: db-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 70    # postgres user in alpine/postgres image
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: psql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: rds-master, key: host } }
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: rds-master, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: rds-master, key: password } }
            - name: PGSSLMODE
              value: require
            - name: ENVS
              value: "dev qa uat"   # overridden in prod overlay to "prod"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              for env in $ENVS; do
                role="app_${env}"
                db="devops_${env}"

                echo "→ ensuring role ${role} (IAM-auth) exists, master is NOT a member"
                # IMPORTANT: do NOT GRANT ${role} TO CURRENT_USER (master) — RDS Postgres
                # treats any role that inherits rds_iam as IAM-auth-only and immediately
                # disables password authentication for it. So master would lose access.
                # We REVOKE on every run to clean up any prior misconfiguration.
                psql -d postgres -v ON_ERROR_STOP=1 <<SQL
                  DO \$\$
                  BEGIN
                    IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${role}') THEN
                      CREATE ROLE ${role} LOGIN;
                      GRANT rds_iam TO ${role};
                    END IF;
                  END
                  \$\$;
              SQL
                # Best-effort cleanup; OK if not present.
                psql -d postgres -c "REVOKE ${role} FROM CURRENT_USER" 2>/dev/null || true

                echo "→ creating database ${db} owned by ${role}"
                # CREATE DATABASE cannot run inside a transaction; do existence check separately.
                if ! psql -tc "SELECT 1 FROM pg_database WHERE datname='${db}'" -d postgres | grep -q 1; then
                  psql -d postgres -c "CREATE DATABASE ${db} OWNER ${role}"
                fi

                # ───────────── application schemas + tables (idempotent) ─────────────
                # Replaces per-service `migrations/0001_init.up.sql`. dev/qa/uat overlays
                # disable the Helm PreSync migrate job (no migrate-runner image), so this
                # Job is the single source of schema truth.
                # Master creates objects, then GRANTs DML privileges to ${role}. We do
                # NOT change ownership (would need role membership → breaks master auth).
                echo "→ provisioning auth/tasks/notifier schemas in ${db}"
                psql -d "${db}" -v ON_ERROR_STOP=1 -c "CREATE SCHEMA IF NOT EXISTS auth; CREATE SCHEMA IF NOT EXISTS tasks; CREATE SCHEMA IF NOT EXISTS notifier;"

                psql -d "${db}" -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS auth.users (id BIGSERIAL PRIMARY KEY, email TEXT NOT NULL UNIQUE, password_hash TEXT NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE INDEX IF NOT EXISTS idx_users_email ON auth.users(email);"

                psql -d "${db}" -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS tasks.tasks (id BIGSERIAL PRIMARY KEY, user_id BIGINT NOT NULL, name TEXT NOT NULL, done BOOLEAN NOT NULL DEFAULT FALSE, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE INDEX IF NOT EXISTS idx_tasks_user ON tasks.tasks(user_id);"

                psql -d "${db}" -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS notifier.notifications (id BIGSERIAL PRIMARY KEY, user_id BIGINT NOT NULL, kind TEXT NOT NULL, body TEXT NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE INDEX IF NOT EXISTS idx_notifications_user ON notifier.notifications(user_id);"

                # Grant DML access to the IAM-auth role. ALTER DEFAULT PRIVILEGES makes
                # future objects (e.g., later migrations) also accessible.
                echo "→ granting DML privileges to ${role}"
                for schema in auth tasks notifier; do
                  psql -d "${db}" -v ON_ERROR_STOP=1 -c "GRANT USAGE ON SCHEMA ${schema} TO ${role}; GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA ${schema} TO ${role}; GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA ${schema} TO ${role}; ALTER DEFAULT PRIVILEGES IN SCHEMA ${schema} GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO ${role}; ALTER DEFAULT PRIVILEGES IN SCHEMA ${schema} GRANT USAGE, SELECT ON SEQUENCES TO ${role};"
                done

                # Apps connect without schema-qualifying their queries; set search_path
                # on the role so `users`, `tasks`, `notifications` resolve unambiguously.
                psql -d "${db}" -v ON_ERROR_STOP=1 -c "ALTER ROLE ${role} SET search_path = auth, tasks, notifier, public"
              done
              echo "✓ done"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { memory: 128Mi }
