name: CI · auth-svc

on:
  push:
    branches: [main]
    paths:
      - 'apps/auth-svc/**'
      - 'charts/auth-svc/**'
      - '.github/workflows/_reusable-ci-go-svc.yaml'
      - '.github/workflows/ci-auth-svc.yaml'
  pull_request:
    paths:
      - 'apps/auth-svc/**'
      - 'charts/auth-svc/**'
  workflow_dispatch:

# Mirror the permissions block from the reusable workflow. Reusable workflows
# can only narrow caller permissions, not grant new ones — without this, the
# called workflow fails to start with "Permission is not granted".
permissions:
  id-token: write
  contents: write
  security-events: write
  pull-requests: read

jobs:
  ci:
    uses: ./.github/workflows/_reusable-ci-go-svc.yaml
    with:
      service: auth-svc
      ecr_registry: ${{ vars.ECR_REGISTRY }}
    secrets:
      AWS_ROLE_ECR_PUSH: ${{ secrets.AWS_ROLE_ECR_PUSH }}
      GITOPS_BOT_TOKEN: ${{ secrets.GITOPS_BOT_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
