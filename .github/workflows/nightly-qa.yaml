name: Nightly · promote dev → qa

on:
  # Cron schedule disabled — project is in teardown; nightly promote was emailing
  # failures every day against torn-down infra. Re-add to resume nightly dev→qa:
  #   schedule:
  #     - cron: '0 0 * * *'   # 00:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # for AWS OIDC (used by Slack notify to fetch webhook from SSM)

jobs:
  smoke-and-promote:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITOPS_BOT_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ECR_PUSH }}
          aws-region: us-east-1

      - name: Notify Slack — started
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ./tools/slack-notify.sh START "nightly-qa · promoting dev to qa" "trigger - ${{ github.event_name }}"

      # In a real setup we'd run integration / k6 smoke against dev here.
      # For this scaffold we trust per-service CI tests + Argo Rollouts'
      # Prometheus analysis to gate; the nightly is just a scheduled promotion.
      - name: Copy dev tags into qa overlay
        id: bump
        run: |
          set -e
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          python3 - <<PY
          import yaml
          for svc in ("frontend", "auth-svc", "tasks-svc", "notifier-svc"):
              with open(f"gitops/overlays/dev/{svc}.yaml") as f: dev = yaml.safe_load(f) or {}
              with open(f"gitops/overlays/qa/{svc}.yaml") as f: qa = yaml.safe_load(f) or {}
              tag = dev.get("image", {}).get("tag")
              if tag and tag != "git-replaceme":
                  qa.setdefault("image", {})["tag"] = tag
                  if "digest" in dev.get("image", {}):
                      qa["image"]["digest"] = dev["image"]["digest"]
                  with open(f"gitops/overlays/qa/{svc}.yaml", "w") as f:
                      yaml.safe_dump(qa, f, sort_keys=False, default_flow_style=False)
          PY
          git add gitops/overlays/qa/*.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore(qa): nightly promote from dev"
            git push origin main
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack — success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ steps.bump.outputs.promoted }}" = "true" ]; then
            ./tools/slack-notify.sh SUCCESS "QA promoted from dev" "all 4 services bumped" "ArgoCD will reconcile within ~3min"
          else
            ./tools/slack-notify.sh SUCCESS "QA already in sync with dev" "no overlay change committed"
          fi

      - name: Notify Slack — failed
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ./tools/slack-notify.sh FAIL "nightly-qa workflow FAILED" "see run for logs"
