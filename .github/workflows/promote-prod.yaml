name: promote → PROD

# Triggered by release-please cutting a stable tag (e.g. v1.2.0). Only fires
# for non-prerelease tags. Semantics: "freeze the current UAT state as a PROD
# release". Reads image refs from gitops/overlays/uat/*.yaml, cosign-verifies
# each, then writes them to gitops/overlays/prod/*.yaml.
#
# Gates (defense in depth):
#   1. GitHub Environment "prod-promote" → required human reviewer
#   2. cosign keyless verify each image's Sigstore signature
#   3. (in-cluster) Kyverno verifyImages ClusterPolicy at admission

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  id-token: write    # required for cosign keyless verify
  contents: write

jobs:
  notify-awaiting-approval:
    # Runs BEFORE the gated promote job. The promote job itself blocks on the
    # `prod-promote` Environment reviewer; without this preview job, no Slack
    # message would fire while waiting (the gated job's steps don't execute
    # until approval).
    if: ${{ vars.AWS_BOOTSTRAPPED == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ECR_PUSH }}
          aws-region: us-east-1
      - name: Notify Slack — awaiting reviewer approval
        run: |
          ./tools/slack-notify.sh APPROVAL "promote to PROD ${{ github.ref_name }} awaiting approval" "approve at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  promote:
    name: verify + bump prod overlay
    needs: notify-awaiting-approval
    if: ${{ vars.AWS_BOOTSTRAPPED == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: prod-promote
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITOPS_BOT_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ECR_PUSH }}
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Notify Slack — production promote started
        run: |
          ./tools/slack-notify.sh START "promote to PROD triggered by tag ${{ github.ref_name }}" "human approval gate passed; verifying UAT image signatures..."

      - name: Read UAT image refs + cosign verify
        env:
          REGISTRY: ${{ vars.ECR_REGISTRY }}
          OIDC_ISSUER: https://token.actions.githubusercontent.com
          IDENTITY_REGEX: ^https://github.com/${{ github.repository }}/.+$
        run: |
          set -e
          for svc in frontend auth-svc tasks-svc notifier-svc; do
            TAG=$(python3 -c "import yaml; print(yaml.safe_load(open('gitops/overlays/uat/${svc}.yaml'))['image']['tag'])")
            echo "→ verifying ${svc}:${TAG}"
            cosign verify \
              --certificate-oidc-issuer "$OIDC_ISSUER" \
              --certificate-identity-regexp "$IDENTITY_REGEX" \
              "$REGISTRY/usf-devops/${svc}:${TAG}"
          done

      - name: Bump PROD overlay (copy UAT image refs)
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -e
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          python3 - <<PY
          import yaml
          for svc in ("frontend", "auth-svc", "tasks-svc", "notifier-svc"):
              with open(f"gitops/overlays/uat/{svc}.yaml") as f:
                  uat = yaml.safe_load(f) or {}
              with open(f"gitops/overlays/prod/{svc}.yaml") as f:
                  prod = yaml.safe_load(f) or {}
              prod.setdefault("image", {})
              prod["image"]["repository"] = uat["image"]["repository"]
              prod["image"]["tag"] = uat["image"]["tag"]
              if "digest" in uat["image"]:
                  prod["image"]["digest"] = uat["image"]["digest"]
              with open(f"gitops/overlays/prod/{svc}.yaml", "w") as f:
                  yaml.safe_dump(prod, f, sort_keys=False, default_flow_style=False)
          PY
          git add gitops/overlays/prod/*.yaml
          if git diff --cached --quiet; then
            echo "no overlay changes (prod already == uat) — nothing to commit"
          else
            git commit -m "chore(prod): promote from UAT via release tag ${RELEASE_TAG}"
            git push origin main
          fi

      - name: Notify Slack — production released
        if: success()
        run: |
          ./tools/slack-notify.sh SUCCESS ":tada: PRODUCTION release ${{ github.ref_name }} deployed" "4/4 cosign signatures verified" "Kyverno verifyImages will enforce at admission" "ArgoCD prod will reconcile in ~30s"

      - name: Notify Slack — failed
        if: failure()
        run: |
          ./tools/slack-notify.sh FAIL "promote to PROD failed for ${{ github.ref_name }}" "see workflow run for details"
