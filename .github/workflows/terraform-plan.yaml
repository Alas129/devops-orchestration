name: Terraform · plan

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform-*.yaml'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  static-checks:
    name: lint & scan
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: terraform fmt -check
        run: terraform -chdir=infra/terraform fmt -recursive -check -diff

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: tflint
        run: |
          cd infra/terraform
          tflint --init
          tflint --recursive --format=compact

      - name: tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: infra/terraform
          sarif_file: tfsec.sarif

      - name: Upload tfsec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec.sarif
          category: tfsec

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          framework: terraform
          quiet: true
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false
          skip_check: CKV_AWS_158,CKV_AWS_338  # see infra/terraform/.checkov.yaml

      - name: Upload checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  plan:
    name: plan ${{ matrix.env }}
    needs: static-checks
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        env: [_shared, nonprod, prod]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TF_PLAN }}
          aws-region: us-east-1

      - name: terraform init
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=usf-devops-tflock"

      - name: terraform validate
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        working-directory: infra/terraform/envs/${{ matrix.env }}
        env:
          TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_repository: ${{ github.repository }}
        run: |
          terraform plan -no-color -out=plan.bin -detailed-exitcode | tee plan.txt
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}-${{ github.sha }}
          path: infra/terraform/envs/${{ matrix.env }}/plan.bin
          retention-days: 7

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = `infra/terraform/envs/${{ matrix.env }}/plan.txt`;
            const raw = fs.readFileSync(path, 'utf8');
            const trimmed = raw.length > 60000 ? raw.slice(0, 60000) + '\n...(truncated)' : raw;
            const body = `### terraform plan · \`${{ matrix.env }}\`\n<details><summary>show plan</summary>\n\n\`\`\`hcl\n${trimmed}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
