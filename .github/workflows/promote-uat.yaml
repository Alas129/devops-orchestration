name: promote → UAT

# Triggered by release-please cutting a pre-release tag (e.g. v1.2.0-rc.1).
# Verifies cosign signatures and bumps gitops/overlays/uat/*.yaml so ArgoCD
# on the nonprod cluster rolls UAT to the new tag. ArgoCD then runs PreSync
# migrations and a canary.

on:
  push:
    tags:
      - 'v*-rc.*'

permissions:
  id-token: write
  contents: write

jobs:
  verify:
    name: cosign verify
    # Skip until ECR exists and images are actually being pushed.
    if: ${{ vars.AWS_BOOTSTRAPPED == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: sigstore/cosign-installer@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ECR_PUSH }}
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Verify each service image is signed
        env:
          REGISTRY: ${{ vars.ECR_REGISTRY }}
          TAG: ${{ github.ref_name }}
          OIDC_ISSUER: https://token.actions.githubusercontent.com
          IDENTITY_REGEX: ^https://github.com/${{ github.repository }}/.+$
        run: |
          set -e
          for svc in frontend auth-svc tasks-svc notifier-svc; do
            echo "→ verifying $svc:$TAG"
            cosign verify \
              --certificate-oidc-issuer "$OIDC_ISSUER" \
              --certificate-identity-regexp "$IDENTITY_REGEX" \
              "$REGISTRY/usf-devops/$svc:$TAG"
          done

  bump:
    name: bump uat overlay
    needs: verify
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITOPS_BOT_TOKEN }}

      - name: Bump UAT overlay
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          python3 - <<PY
          import yaml, os
          tag = os.environ["TAG"]
          for svc in ("frontend", "auth-svc", "tasks-svc", "notifier-svc"):
              p = f"gitops/overlays/uat/{svc}.yaml"
              with open(p) as f: d = yaml.safe_load(f) or {}
              d.setdefault("image", {})["tag"] = tag
              with open(p, "w") as f: yaml.safe_dump(d, f, sort_keys=False, default_flow_style=False)
          PY
          git add gitops/overlays/uat/*.yaml
          git commit -m "chore(uat): promote to $TAG"
          git push origin main
