name: Dependency review

# Blocks PRs that introduce dependencies with known HIGH/CRITICAL CVEs or
# disallowed licenses. Complements Dependabot (which fixes after merge).

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
